<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ضرغام CNC — تصاميم خشبية فاخرة بتقنية CNC في العراق. جداريات، أبواب، وديكور مخصص."
    />
    <meta name="theme-color" content="#448d6f" />
    <meta name="color-scheme" content="light dark" />

    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />

    <title>ضرغام CNC | Dorgham CNC</title>
    <script>
      (function () {
        var theme = localStorage.getItem('dorgham-cnc-theme')
        var isDark =
          theme === 'dark' ||
          (theme !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.classList.toggle('dark', isDark)
        document.documentElement.style.colorScheme = isDark ? 'dark' : 'light'
      })()
    </script>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #faf9f7;
        font-family: Tajawal, system-ui, -apple-system, Segoe UI, sans-serif;
      }
      html.dark,
      html.dark body {
        background: #1a1f1e;
      }
      #root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
